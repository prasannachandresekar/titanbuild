<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TitanBuild | Access Your Account</title>
    <meta name="description" content="Login to your TitanBuild account to access project dashboard, manage services, and view your construction projects.">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body class="login-page">
    <!-- LOGIN CONTAINER -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html">
                    <img src="assets/images/logo.svg" alt="TitanBuild Logo">
                </a>
            </div>
            <div class="auth-header">
                <h2>Welcome Back</h2>
            </div>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-color);">
                        <input type="checkbox" name="remember" style="width: auto;">
                        <span style="font-size: 0.875rem;">Remember me</span>
                    </label>
                    <a href="#" style="color: var(--primary); text-decoration: none; font-size: 0.875rem;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <div class="auth-divider">or</div>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button class="btn btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <span>🔷</span> Continue with Google
                </button>
                <button class="btn btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <span>🔵</span> Continue with Microsoft
                </button>
            </div>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <button id="scrollTopBtn">↑</button>
</body>
</html>
